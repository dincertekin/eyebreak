name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore eyebreak.sln

      - name: Build
        run: dotnet build eyebreak.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test eyebreak.sln --no-build --configuration Release --verbosity normal
